name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: smoke tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]    # start with Linux only; expand once stable
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        # Only install the S3 + parquet extras — the tests don't need
        # azure / sftp / mysql because those adapters are lazily imported.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3,parquet]"
          pip install pytest

      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short --maxfail=3

  examples:
    name: end-to-end examples
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3,parquet]"
      - name: Run examples (each must complete cleanly)
        run: |
          PYTHONPATH=. python examples/cross_cloud_share.py
          PYTHONPATH=. python examples/policy_demo.py
          PYTHONPATH=. python examples/batch_demo.py
          PYTHONPATH=. python examples/production_features_demo.py