name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: smoke tests (Python ${{ matrix.python-version }} on Ubuntu)
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        # Only the S3 + parquet extras (tests use S3 + parquet codecs).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3,parquet]"
          pip install pytest

      - name: Run smoke tests
        run: |
          pytest tests/ -v --tb=short --maxfail=3 -x

  examples:
    name: end-to-end examples (Python 3.11)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[s3,parquet]"
      - name: Run examples (each must complete cleanly)
        run: |
          PYTHONPATH=. python examples/cross_cloud_share.py
          PYTHONPATH=. python examples/policy_demo.py
          PYTHONPATH=. python examples/batch_demo.py
          PYTHONPATH=. python examples/production_features_demo.py