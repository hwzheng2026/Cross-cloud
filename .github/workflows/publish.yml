name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  pypi:
    name: Build + upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution
        run: |
          pip install twine
          twine check dist/*

      - name: Upload to PyPI (via trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token needed: configured via PyPI trusted publishing
        # (see docs/DEPLOY.md → "Publishing to PyPI")

  test-pypi:
    name: Build + upload to TestPyPI (on every PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build
        run: python -m build
      - name: Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/