name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish (production | test | dry-run)"
        required: true
        type: choice
        default: "test"
        options:
          - production
          - test
          - dry-run

jobs:
  pypi:
    name: Build + publish
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'release' && 'pypi' || (inputs.target == 'production' && 'pypi' || 'testpypi') }}
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write   # required for PyPI trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'dry-run'
        run: |
          echo "=== DRY RUN: dist/ artifacts that would be uploaded ==="
          ls -la dist/
          twine check dist/*

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'test'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
        uses: pypa/gh-action-pypi-publish@release/v1